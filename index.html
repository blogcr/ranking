<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking Analytics</title>

<!-- Fonte Arimo -->
<link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;600;700&display=swap" rel="stylesheet">

<!-- Favicon -->
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

<style>

body{
  font-family:'Arimo', sans-serif;
  background:#f4f4f4;
  margin:20px 0;
  padding:20px;
}

.container{
  /* max-width:1300px; */
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
  gap:18px;
}

.card{
  position:relative;
  /* aspect-ratio:16/10; */
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
  text-decoration:none;
  display:block;
  transition:transform .2s ease;
}

.card:hover{
  transform:scale(1.02);
}

.card-img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.15));
  padding:18px;
}

.views{
  position:absolute;
  top:12px;
  right:12px;
  font-size:13px;
  background:rgba(0,0,0,0.65);
  padding:6px 10px;
  border-radius:20px;
  font-weight:600;
  color:#fff;
}

.bottom{
  position:absolute;
  left:18px;
  right:18px;
  bottom:18px;
  height:82px;
  display:flex;
  flex-direction:column;
}

.autor{
  background:#B71C1C;
  padding:7px 12px;
  font-size:12px;
  font-weight:700;
  text-transform:uppercase;
  border-radius:6px;
  width:fit-content;
  margin-bottom:8px;
  color:#fff;
  white-space: nowrap;     /* Impede que o texto pule para a linha de baixo */
  overflow: hidden;        /* Esconde o que sobrar se o espaço acabar */
  text-overflow: ellipsis; /* Adiciona "..." caso o nome seja longo demais */
  display: block;          /* Garante que o elemento se comporte como bloco */
}

.titulo{
  font-size:18px;
  line-height:1.25;
  font-weight:600;
  color:#fff;

  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

/* Mobile compacto */

@media (max-width:768px){

  .grid{
    grid-template-columns:1fr;
  }

  .card{
    aspect-ratio:auto;
    height:95px;
  }

  .bottom{
    height:auto;
  }

  .titulo{
    font-size:14px;
  }

  .autor{
    font-size:11px;
  }

}

.fade-in{
  opacity:0;
  transform:translateY(15px);
  animation:fadeUp 0.6s ease forwards;
}

@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>
</head>

<body>

<div class="container">
  <div id="ranking">Carregando...</div>
</div>

<script>

var api = "https://script.google.com/macros/s/AKfycbxK-fkKQsnO4i6ZWXBG3OCX2tKlbbVl_IR-ob-H10kEIwr_qm6SZQBcwjjyp0zOZfqCFg/exec";

var container = document.getElementById("ranking");
container.innerHTML = '<div class="grid"></div>';
var grid = document.querySelector(".grid");

fetch(api)
  .then(response => response.json())
  .then(data => {

    if(!data || data.length === 0){
      container.innerHTML = "Nenhum resultado.";
      return;
    }

    data.slice(0,10).forEach(function(item, index){

      var imagem = item.image
        ? item.image.replace("s1200","s600")
        : "https://via.placeholder.com/800x600?text=Sem+Imagem";

      var card = document.createElement("a");
      card.href = item.url;
      card.target = "_blank";
      card.className = "card";
      card.style.opacity = "0";

      var img = document.createElement("img");
      img.src = imagem;
      img.className = "card-img";
      img.loading = "lazy";

      var overlay = document.createElement("div");
      overlay.className = "overlay";

      overlay.innerHTML =
        '<div class="views">'+ item.views +' visualizações</div>' +
        '<div class="bottom">' +
          '<div class="autor">'+ item.author +'</div>' +
          '<div class="titulo">'+ item.title +'</div>' +
        '</div>';

      card.appendChild(img);
      card.appendChild(overlay);
      grid.appendChild(card);

      img.onload = function(){
        setTimeout(function(){
          card.classList.add("fade-in");
        }, index * 120);
      };

    });

  })
  .catch(function(){
    container.innerHTML =
      "<p style='color:#b00'>Erro ao carregar ranking.</p>";
  });

</script>

</body>
</html>
