<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking Analytics</title>

<style>
body{
  font-family: Georgia, serif;
  background:#f4f4f4;
  margin:0;
  padding:40px 20px;
}

.container{
  max-width:900px;
  margin:auto;
  background:#ffffff;
  padding:40px;
  border-radius:10px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
  font-size:48px;
  margin-bottom:10px;
}

h2{
  font-size:28px;
  font-weight:normal;
  margin-bottom:40px;
  color:#444;
}

.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 0;
  border-bottom:1px solid #eee;
  transition:background 0.2s ease;
}

.item:hover{
  background:#fafafa;
}

.numero{
  font-size:20px;
  font-weight:bold;
  width:40px;
}

.link{
  flex:1;
  text-decoration:none;
  color:#000;
  font-size:18px;
}

.link:hover{
  text-decoration:underline;
}

.views{
  font-size:14px;
  color:#666;
}

.loading{
  color:#666;
}

.erro{
  color:#b00020;
}
</style>
</head>
<body>

<div class="container">
  <h1>Ranking Analytics</h1>
  <h2>Mais lidos da semana</h2>
  <div id="ranking" class="loading">Carregando...</div>
</div>

<script>

const api = "https://script.google.com/macros/s/AKfycbxK-fkKQsnO4i6ZWXBG3OCX2tKlbbVl_IR-ob-H10kEIwr_qm6SZQBcwjjyp0zOZfqCFg/exec";

async function carregarRanking() {

  const container = document.getElementById("ranking");

  try {

    const response = await fetch(api, { cache: "no-store" });

    if (!response.ok) {
      throw new Error("Resposta inválida da API");
    }

    const data = await response.json();

    container.innerHTML = "";

    if (!Array.isArray(data) || data.length === 0) {
      container.innerHTML = "Nenhum resultado encontrado.";
      return;
    }

    data.forEach(function(item, index){

      const div = document.createElement("div");
      div.className = "item";

      const numero = document.createElement("div");
      numero.className = "numero";
      numero.textContent = index + 1;

      const link = document.createElement("a");
      link.className = "link";
      link.href = item.url;
      link.target = "_blank";
      link.rel = "noopener";

      link.textContent = formatarTitulo(item.url);

      const views = document.createElement("div");
      views.className = "views";
      views.textContent = item.views + " visualizações";

      div.appendChild(numero);
      div.appendChild(link);
      div.appendChild(views);

      container.appendChild(div);

    });

  } catch (erro) {

    container.className = "erro";
    container.textContent = "Erro ao carregar ranking.";

  }
}

function formatarTitulo(url) {

  return url
    .split("/")
    .pop()
    .replace(".html","")
    .replace(/-/g," ")
    .replace(/\b\w/g,function(l){ return l.toUpperCase(); });
}

carregarRanking();

</script>

</body>
</html>
