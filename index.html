<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking Analytics</title>

<style>
body{
  font-family: Georgia, serif;
  background:#f4f4f4;
  margin:0;
  padding:20px;
}

.container{
  max-width:1300px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
  gap:18px;
}

.card{
  position:relative;
  aspect-ratio: 16 / 10;
  border-radius:12px;
  overflow:hidden;
  background-size:cover;
  background-position:center;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
  color:#fff;
  text-decoration:none;
  transition:transform .2s ease;
}

.card:hover{
  transform:scale(1.02);
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.75), rgba(0,0,0,0.15));
  padding:16px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.views{
  align-self:flex-end;
  font-size:12px;
  background:rgba(0,0,0,0.55);
  padding:5px 9px;
  border-radius:20px;
}

.bottom{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.autor{
  display:inline-block;
  background:#B71C1C;
  padding:6px 10px;
  font-size:11px;
  font-weight:bold;
  text-transform:uppercase;
  border-radius:6px;
  width:fit-content;
}

.titulo{
  font-size:16px;
  line-height:1.3;
  font-weight:600;
}
</style>

</head>
<body>

<div class="container">
  <div id="ranking">Carregando...</div>
</div>

<script>

var api = "https://script.google.com/macros/s/AKfycbxK-fkKQsnO4i6ZWXBG3OCX2tKlbbVl_IR-ob-H10kEIwr_qm6SZQBcwjjyp0zOZfqCFg/exec";

fetch(api)
  .then(response => response.json())
  .then(data => {

    var container = document.getElementById("ranking");

    if(!data || data.length === 0){
      container.innerHTML = "Nenhum resultado.";
      return;
    }

    container.innerHTML = '<div class="grid"></div>';
    var grid = document.querySelector(".grid");

    data.slice(0,10).forEach(function(item){

      var imagem = item.image || "https://via.placeholder.com/800x600?text=Sem+Imagem";

      var card =
        '<a href="'+ item.url +'" target="_blank" class="card" style="background-image:url('+ imagem +')">' +
          '<div class="overlay">' +
            '<div class="views">'+ item.views +' visualizações</div>' +
            '<div class="bottom">' +
              '<div class="autor">'+ item.author +'</div>' +
              '<div class="titulo">'+ item.title +'</div>' +
            '</div>' +
          '</div>' +
        '</a>';

      grid.innerHTML += card;

    });

  })
  .catch(function(){
    document.getElementById("ranking").innerHTML =
      "<p style='color:#b00'>Erro ao carregar ranking.</p>";
  });

</script>

</body>
</html>
