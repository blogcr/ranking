<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking Analytics</title>

<style>
body{
  font-family: Georgia, serif;
  background:#f4f4f4;
  margin:0;
  padding:40px 20px;
}

.container{
  max-width:1200px;
  margin:auto;
}

h1{
  font-size:48px;
  margin-bottom:10px;
}

h2{
  font-size:28px;
  font-weight:normal;
  margin-bottom:40px;
  color:#444;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:25px;
}

.card{
  position:relative;
  height:260px;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  background-size:cover;
  background-position:center;
  color:#fff;
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.75), rgba(0,0,0,0.1));
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
}

.autor{
  font-size:14px;
  text-transform:uppercase;
  letter-spacing:1px;
  opacity:0.9;
}

.titulo{
  font-size:20px;
  margin:5px 0 8px 0;
  line-height:1.3;
}

.views{
  font-size:13px;
  opacity:0.8;
}
</style>
</head>
<body>

<div class="container">
  <h1>Ranking Analytics</h1>
  <h2>Mais lidos da semana</h2>
  <div id="ranking">Carregando...</div>
</div>

<script>

var apiRanking = "https://script.google.com/macros/s/AKfycbxK-fkKQsnO4i6ZWXBG3OCX2tKlbbVl_IR-ob-H10kEIwr_qm6SZQBcwjjyp0zOZfqCFg/exec";
var feedBlogger = "https://www.carlosromero.com.br/feeds/posts/default?alt=json&max-results=50";

Promise.all([
  fetch(apiRanking).then(r => r.json()),
  fetch(feedBlogger).then(r => r.json())
])
.then(function([ranking, feed]){

  var container = document.getElementById("ranking");
  container.innerHTML = '<div class="grid"></div>';
  var grid = document.querySelector(".grid");

  var posts = feed.feed.entry;

  ranking.forEach(function(item){

    var match = posts.find(function(post){
      var link = post.link.find(l => l.rel === "alternate").href;
      return link === item.url;
    });

    if(!match) return;

    var titulo = match.title.$t;
    var autor = match.author[0].name.$t;

    var imagem = "";
    if(match.media$thumbnail){
      imagem = match.media$thumbnail.url.replace("s72-c","s1200");
    }

    if(!imagem){
      imagem = "https://via.placeholder.com/800x600?text=Sem+Imagem";
    }

    var card =
      '<a href="'+ item.url +'" target="_blank" class="card" style="background-image:url('+ imagem +')">' +
        '<div class="overlay">' +
          '<div class="autor">'+ autor +'</div>' +
          '<div class="titulo">'+ titulo +'</div>' +
          '<div class="views">'+ item.views +' visualizações</div>' +
        '</div>' +
      '</a>';

    grid.innerHTML += card;

  });

})
.catch(function(){
  document.getElementById("ranking").innerHTML =
    "<p style='color:#b00'>Erro ao carregar ranking.</p>";
});

</script>

</body>
</html>
