<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking Analytics</title>

<!-- Fonte Arimo -->
<link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;600;700&display=swap" rel="stylesheet">

<!-- Favicon SVG com R estilizado -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E
%3Crect width='100' height='100' rx='18' fill='%23B71C1C'/%3E
%3Ctext x='50' y='68' font-size='60' text-anchor='middle' fill='white' font-family='Arimo, Arial, sans-serif' font-weight='700'%3ER%3C/text%3E
%3C/svg%3E">

<style>

body{
  font-family:'Arimo', sans-serif;
  background:#f4f4f4;
  margin:0;
  padding:20px;
}

.container{
  max-width:1300px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
  gap:18px;
}

.card{
  position:relative;
  aspect-ratio:16 / 10;
  border-radius:12px;
  overflow:hidden;
  background-size:cover;
  background-position:center;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
  color:#fff;
  text-decoration:none;
  transition:transform .2s ease;
}

.card:hover{
  transform:scale(1.02);
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.15));
  padding:18px;
}

.views{
  position:absolute;
  top:12px;
  right:12px;
  font-size:13px;
  background:rgba(0,0,0,0.65);
  padding:6px 10px;
  border-radius:20px;
  font-weight:600;
}

.bottom{
  position:absolute;
  left:18px;
  right:18px;
  bottom:18px;

  height:78px; /* ALTURA FIXA PARA TODOS */
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
}

.autor{
  background:#B71C1C;
  padding:7px 12px;
  font-size:13px; /* levemente maior */
  font-weight:700;
  text-transform:uppercase;
  border-radius:6px;
  width:fit-content;
  margin-bottom:8px;
}

.titulo{
  font-size:18px;
  line-height:1.25;
  font-weight:600;

  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
  
/* Modo compacto mobile */

@media (max-width: 768px){

  .grid{
    grid-template-columns:1fr;
    gap:12px;
  }

  .card{
    aspect-ratio:auto;
    height:95px;
    display:flex;
  }

  .overlay{
    background:rgba(0,0,0,0.55);
    flex-direction:row;
    align-items:center;
    justify-content:space-between;
    padding:12px;
  }

  .bottom{
    gap:4px;
  }

  .autor{
    font-size:10px;
    padding:4px 8px;
  }

  .titulo{
    font-size:14px;
    line-height:1.2;
    max-width:220px;
  }

  .views{
    font-size:11px;
    padding:4px 8px;
  }

}

</style>

</head>
<body>

<div class="container">
  <div id="ranking">Carregando...</div>
</div>

<script>

var api = "https://script.google.com/macros/s/AKfycbxK-fkKQsnO4i6ZWXBG3OCX2tKlbbVl_IR-ob-H10kEIwr_qm6SZQBcwjjyp0zOZfqCFg/exec";

fetch(api)
  .then(response => response.json())
  .then(data => {

    var container = document.getElementById("ranking");

    if(!data || data.length === 0){
      container.innerHTML = "Nenhum resultado.";
      return;
    }

    container.innerHTML = '<div class="grid"></div>';
    var grid = document.querySelector(".grid");

    data.slice(0,10).forEach(function(item){

      var imagem = item.image || "https://via.placeholder.com/800x600?text=Sem+Imagem";

      var card =
        '<a href="'+ item.url +'" target="_blank" class="card" style="background-image:url('+ imagem +')">' +
          '<div class="overlay">' +
            '<div class="views">'+ item.views +' usuários</div>' +
            '<div class="bottom">' +
              '<div class="autor">'+ item.author +'</div>' +
              '<div class="titulo">'+ item.title +'</div>' +
            '</div>' +
          '</div>' +
        '</a>';

      grid.innerHTML += card;

    });

  })
  .catch(function(){
    document.getElementById("ranking").innerHTML =
      "<p style='color:#b00'>Erro ao carregar ranking.</p>";
  });

</script>

</body>
</html>
