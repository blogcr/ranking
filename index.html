<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking Analytics</title>

<link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;600;700;900&display=swap" rel="stylesheet">

<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

<style>
  body {
    font-family: 'Arimo', sans-serif;
    background: #f4f4f4;
    margin: 20px 0;
    padding: 20px;
  }

  .container {
    max-width: 1350px;
    margin: auto;
  }

  .grid {
    display: grid;
    /* Retomando as 5 colunas conforme as imagens enviadas */
    grid-template-columns: repeat(5, 1fr); 
    gap: 18px;
  }

  .card {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    text-decoration: none;
    display: block;
    transition: transform .2s ease;
    background: #000;
    aspect-ratio: 16/11;
  }

  .card:hover { transform: scale(1.02); }

  .card-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .overlay {
    position: absolute;
    inset: 0;
    /* Gradiente focado na base para leitura do título */
    background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, transparent 80%);
    padding: 18px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  /* Números do Ranking: Ajustados para não encostar na borda superior */
  .ranking-number {
    position: absolute;
    top: 15px; /* Espaço da borda superior */
    left: 18px;
    font-size: 40px;
    font-weight: 900;
    color: rgba(255, 255, 255, 0.35); /* Opacidade equilibrada para visibilidade */
    line-height: 1;
    z-index: 1;
    pointer-events: none;
  }

  .views {
    position: absolute;
    top: 12px;
    right: 12px;
    font-size: 12px;
    background: rgba(0,0,0,0.7);
    padding: 6px 10px;
    border-radius: 20px;
    font-weight: 600;
    color: #fff;
    z-index: 2;
  }

  .bottom {
    position: relative;
    z-index: 2;
  }

  .autor {
    background: #B71C1C;
    padding: 7px 12px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    border-radius: 6px;
    color: #fff;
    margin-bottom: 8px;
    
    /* Manter uma linha com reticências */
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 92%;
    box-sizing: border-box;
  }

  .titulo {
    font-size: 15px;
    line-height: 1.25;
    font-weight: 600;
    color: #fff;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Mobile */
  @media (max-width: 1024px) { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; }
    .card { height: 95px; aspect-ratio: auto; }
    .ranking-number { font-size: 32px; top: 10px; }
  }

  .fade-in {
    opacity: 0;
    transform: translateY(15px);
    animation: fadeUp 0.6s ease forwards;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<body>

<div class="container">
  <div id="ranking">Carregando...</div>
</div>

<script>
  var api = "https://script.google.com/macros/s/AKfycbxK-fkKQsnO4i6ZWXBG3OCX2tKlbbVl_IR-ob-H10kEIwr_qm6SZQBcwjjyp0zOZfqCFg/exec";
  var container = document.getElementById("ranking");

  fetch(api)
    .then(response => response.json())
    .then(data => {
      if(!data || data.length === 0){
        container.innerHTML = "Nenhum resultado.";
        return;
      }

      container.innerHTML = '<div class="grid"></div>';
      var grid = container.querySelector(".grid");

      data.slice(0, 10).forEach(function(item, index){
        // Restaura a lógica da imagem placeholder
        var imagem = item.image
          ? item.image.replace("s1200","s600")
          : "https://via.placeholder.com/800x600?text=Sem+Imagem";

        var card = document.createElement("a");
        card.href = item.url;
        card.target = "_blank";
        card.className = "card";
        card.style.opacity = "0";

        card.innerHTML = `
          <div class="ranking-number">${index + 1}</div>
          <div class="views">${item.views} visualizações</div>
          <img src="${imagem}" class="card-img" loading="lazy" onload="setTimeout(() => this.parentElement.classList.add('fade-in'), ${index * 100})">
          <div class="overlay">
            <div class="bottom">
              <div class="autor">${item.author}</div>
              <div class="titulo">${item.title}</div>
            </div>
          </div>
        `;

        grid.appendChild(card);
      });
    })
    .catch(function(err){
      console.error(err);
      container.innerHTML = "<p style='color:#b00'>Erro ao carregar ranking.</p>";
    });
</script>

</body>

</style>
</head>

<body>
<div class="container">
  <div id="ranking"></div>
</div>

<script>
  const api = "https://script.google.com/macros/s/AKfycbxK-fkKQsnO4i6ZWXBG3OCX2tKlbbVl_IR-ob-H10kEIwr_qm6SZQBcwjjyp0zOZfqCFg/exec";
  const container = document.getElementById("ranking");

  fetch(api)
    .then(r => r.json())
    .then(data => {
      container.innerHTML = '<div class="grid"></div>';
      const grid = container.querySelector(".grid");

      data.slice(0, 10).forEach((item, index) => {
        const card = document.createElement("a");
        card.href = item.url;
        card.target = "_blank";
        card.className = "card fade-in";
        card.style.animationDelay = `${index * 0.05}s`;

        card.innerHTML = `
          <div class="ranking-number">${index + 1}</div>
          <div class="views">${item.views} visualizações</div>
          <img src="${item.image ? item.image.replace("s1200","s600") : ''}" class="card-img" loading="lazy">
          <div class="overlay">
            <div class="autor">${item.author}</div>
            <div class="titulo">${item.title}</div>
          </div>
        `;
        grid.appendChild(card);
      });
    });
</script>
</body>
